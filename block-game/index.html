<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>block-game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" id="back-btn">⬅ Menu</a>
    <div class="game-container">
       <div class="header">
    <div class="score-box">
        <div class="label">BEST SCORE</div>
        <div id="best-score">0</div>
    </div>

    <div class="score-box">
        <div class="label">NOW SCORE</div>
        <div id="now-score">0</div>
    </div>

    <div class="score-box">
        <div class="label">TIME</div>
        <div id="time-left">10:00</div>
    </div>
</div>
        <div id="grid-container"></div>
        <div class="preview-section">
            <div id="previews">
                <div class="preview-slot" id="slot-0"></div>
                <div class="preview-slot" id="slot-1"></div>
                <div class="preview-slot" id="slot-2"></div>
            </div>
            <button id="reset-set-btn" onclick="manualReset()">RESET BLOCKS (-50)</button>
        </div>
    </div>
    <div id="overlay">
        <h2>GAME OVER</h2>
        <button onclick="location.reload()">RETRY</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
