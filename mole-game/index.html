<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mole-game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-top">
         <a href="../index.html" id="back-btn">⬅ Menu</a>
        <div>Hits: <span id="hits">0</span>/20</div>
        <div>Lives: <span id="lives">000</span></div>
    </div>

    <div id="overlay">
        <h2 id="status-msg">GAME OVER</h2>
    </div>

    <div class="game-container" id="gameGrid">
        <div class="hole" data-index="0"></div>
        <div class="hole" data-index="1"></div>
        <div class="hole" data-index="2"></div>
        <div class="hole" data-index="3"></div>
        <div class="hole" data-index="4"></div>
        <div class="hole" data-index="5"></div>
        <div class="hole" data-index="6"></div>
        <div class="hole" data-index="7"></div>
        <div class="hole" data-index="8"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
